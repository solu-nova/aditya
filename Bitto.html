<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Aditya ❤️</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
/* Paste your entire CSS here */
</style>
</head>

<body>

<!-- Paste your entire HTML content here -->

<script>
gsap.registerPlugin(ScrollTrigger);

// Floating Hearts
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = Math.random()*25 + 15 + "px";

    const duration = Math.random()*5 + 5;
    heart.style.animationDuration = duration + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    }, duration*1000);
}

setInterval(createHeart,300);

// Fade animations
gsap.utils.toArray(".fade").forEach((item,index)=>{
    gsap.fromTo(
        item,
        {
            opacity:0,
            y:80
        },
        {
            opacity:1,
            y:0,
            duration:1.5,
            delay:index*0.15,
            scrollTrigger:item
        }
    );
});

// Hero animation
gsap.from(".hero-bg div",{
    scale:0.8,
    opacity:0,
    duration:2,
    ease:"power3.out"
});
</script>

</body>
</html>
